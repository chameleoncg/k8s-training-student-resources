apiVersion: v1
kind: Pod
metadata:
  name: multi-container-demo
  labels:
    app: demo-app
spec:
  # 1. Init Container: Runs once to completion before the app starts
  initContainers:
    - name: setup-data
      image: busybox:1.28
      command:
        ["sh", "-c", "echo 'Hello from the Init Container!' > /data/index.html"]
      volumeMounts:
        - name: shared-storage
          mountPath: /data

  # 2. Main Containers: These run simultaneously
  containers:
    - name: web-server
      image: nginx:latest
      volumeMounts:
        - name: shared-storage
          mountPath: /usr/share/nginx/html # Nginx serves files from here
      ports:
        - containerPort: 80

    - name: log-sidecar
      image: busybox:1.28
      command:
        ["sh", "-c", "while true; do date >> /var/log/app.log; sleep 5; done"]
      volumeMounts:
        - name: log-storage
          mountPath: /var/log

  # 3. Volumes: The actual storage backing defined at the Pod level
  volumes:
    - name: shared-storage
      emptyDir: {} # Temporary storage that lives as long as the Pod
    - name: log-storage
      emptyDir: {}
