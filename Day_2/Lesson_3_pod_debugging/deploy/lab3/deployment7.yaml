# lab.yaml

# ── Healthcheck Server ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcheck-server
  namespace: debugging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcheck-server
  template:
    metadata:
      labels:
        app: healthcheck-server
    spec:
      containers:
        - name: server
          image: busybox
          command:
            - sh
            - -c
            - |
              while true; do
                echo -e "HTTP/1.1 200 OK\r\nContent-Length: 2\r\n\r\nOK" | nc -l -p 8080
              done
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: healthcheck-server
  namespace: debugging
spec:
  selector:
    app: healthcheck-server
  ports:
    - port: 8080
      targetPort: 8080
---
# ── NetworkPolicy: blocks deployment7 from reaching healthcheck-server ─
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-deployment7
  namespace: debugging
spec:
  podSelector:
    matchLabels:
      app: healthcheck-server
  policyTypes:
    - Ingress
  ingress: []   # explicit empty ingress = deny all inbound
---
# ── Init Lab Deployment ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment7
  namespace: debugging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment7
  template:
    metadata:
      labels:
        app: deployment7
    spec:
      initContainers:
        - name: wait-for-health
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for healthcheck-server..."
              echo "Attempting wget against http://healthcheck-server:8080"
              until wget -qO- http://healthcheck-server:8080 > /dev/null 2>&1; do
                echo "Health check failed, retrying in 5s..."
                sleep 5
              done
              echo "Health check passed. Starting main container."
      containers:
        - name: app
          image: nginx
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: deployment7
  namespace: debugging
spec:
  selector:
    app: deployment7
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
