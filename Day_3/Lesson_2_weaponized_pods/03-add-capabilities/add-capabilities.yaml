---
apiVersion: v1
kind: Namespace
metadata:
  name: weaponized-pod-03
---
apiVersion: v1
kind: Service
metadata:
  namespace: weaponized-pod-03
  name: nginx
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: nginx
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
      nodePort: 30080
---
apiVersion: v1
kind: Pod
metadata:
  namespace: weaponized-pod-03
  name: totally-nginx
  labels:
    app.kubernetes.io/name: nginx
spec:
  terminationGracePeriodSeconds: 0
  containers:
    - name: nginx
      image: nginx:weaponized
      ports:
        - name: http
          containerPort: 80
      securityContext:
        privileged: true
        capabilities:
          add:
            - CAP_SYS_MODULE
