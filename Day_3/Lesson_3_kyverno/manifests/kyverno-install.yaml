
---
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 2m
  url: https://kyverno.github.io/kyverno
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  chart:
    spec:
      chart: kyverno
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: kyverno
      version: 3.5.2
  install:
    crds: CreateReplace
    createNamespace: true
  interval: 2m
  releaseName: kyverno
  targetNamespace: kyverno
  test:
    enable: false
  timeout: 10m
  values:
    networkPolicies:
      enabled: false
    policyReportsCleanup:
      enabled: false
    admissionController:
      replicas: 1
      webhookTimeout: 15
      container:
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 50m
            memory: 128Mi
