apiVersion: apps/v1
kind: Deployment
metadata:
  name: oidc-echo
  namespace: oidc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oidc-echo
  template:
    metadata:
      labels:
        app: oidc-echo
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -listen=:5678
            - -text=You made it through the Keycloak OIDC login flow.
          ports:
            - containerPort: 5678
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: oidc-echo
  namespace: oidc
spec:
  selector:
    app: oidc-echo
  ports:
    - name: http
      port: 5678
      targetPort: http
