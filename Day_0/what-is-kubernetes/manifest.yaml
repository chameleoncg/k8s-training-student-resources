apiVersion: v1
kind: Namespace
metadata:
  name: obscurity-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: html-config
  namespace: obscurity-demo
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@800&display=swap" rel="stylesheet">
        <style>
            body { margin: 0; background: white; display: flex; flex-direction: column; 
                   align-items: center; justify-content: center; height: 100vh; font-family: 'Work Sans', sans-serif; }
            h1 { text-transform: uppercase; }
            img { width: 100vw; height: 80vh; object-fit: contain; }
        </style>
    </head>
    <body>
        <h1>Container: {{env "WHOAMI"}}</h1>
        <img src="obscurity-frontend.png">
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obscurity-web
  namespace: obscurity-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: caddy
        image: caddy:alpine
        command: ["caddy", "file-server", "--root", "/usr/share/caddy", "--templates", "--access-log"]
        env:
        - name: WHOAMI
          value: "Kubernetes-Pod"
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/caddy/index.html
          subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: html-config
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: obscurity-demo
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080